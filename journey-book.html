<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Journey Book Builder · Transformed by Travels</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:ital,wght@0,300;0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,700;1,400;1,700&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:  #0d1520; --navy2: #121e2d; --navy3: #1a2840;
  --teal:  #2dd4bf; --gold: #f59e0b;
  --text:  #e2e8f0; --soft: #94a3b8; --muted: #64748b;
  --bd:    rgba(255,255,255,0.08);
}
html { scroll-behavior: smooth; }
body { background: var(--navy); color: var(--text); font-family: 'Open Sans', sans-serif; min-height: 100vh; }
h1,h2,h3,h4 { font-family: 'Montserrat', sans-serif; font-weight: 800; }

/* ── TOP BAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,21,32,0.96); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 60px;
}
.topbar-logo { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 0.88rem; color: #fff; }
.topbar-logo span { color: var(--teal); }
.topbar-title { font-size: 0.82rem; color: var(--soft); font-weight: 600; }
.topbar-save { background: none; border: 1px solid rgba(45,212,191,0.35); color: var(--teal); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.78rem; border-radius: 7px; padding: 7px 16px; cursor: pointer; }
.topbar-save:hover { background: rgba(45,212,191,0.08); }

/* ── LAYOUT ── */
.layout { display: flex; min-height: 100vh; padding-top: 60px; }

/* ── SIDEBAR ── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--navy2); border-right: 1px solid var(--bd);
  padding: 28px 0; position: sticky; top: 60px; height: calc(100vh - 60px);
  overflow-y: auto;
}
.sidebar-section { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; padding: 0 20px; margin: 20px 0 8px; }
.sidebar-step {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px; cursor: pointer; transition: background 0.15s;
  font-size: 0.83rem; color: var(--soft); border-left: 3px solid transparent;
}
.sidebar-step:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.sidebar-step.active { background: rgba(45,212,191,0.08); color: var(--teal); border-left-color: var(--teal); }
.sidebar-step.done { color: var(--text); }
.step-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--bd); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-family: 'Montserrat', sans-serif; font-weight: 700; flex-shrink: 0; }
.sidebar-step.active .step-dot { border-color: var(--teal); color: var(--teal); }
.sidebar-step.done   .step-dot { background: rgba(45,212,191,0.15); border-color: rgba(45,212,191,0.4); color: var(--teal); }
.step-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@media(max-width:700px){ .sidebar { display: none; } }

/* ── MAIN ── */
.main { flex: 1; padding: 36px 32px 80px; max-width: 760px; }
@media(max-width:700px){ .main { padding: 24px 16px 80px; } }

/* ── MOBILE PROGRESS ── */
.mobile-progress { display: none; padding: 14px 16px; border-bottom: 1px solid var(--bd); }
.progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--teal); border-radius: 2px; transition: width 0.3s; }
.progress-label { font-size: 0.78rem; color: var(--soft); margin-bottom: 8px; }
@media(max-width:700px){ .mobile-progress { display: block; } }

/* ── STEP HEADER ── */
.step-header { margin-bottom: 28px; }
.step-eyebrow { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
.step-header h2 { font-size: 1.5rem; color: #fff; margin-bottom: 8px; }
.step-header p { font-size: 0.88rem; color: var(--soft); line-height: 1.7; }

/* ── CARDS ── */
.card { background: var(--navy2); border: 1px solid var(--bd); border-radius: 14px; padding: 22px 20px; margin-bottom: 18px; }
.card-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.78rem; color: var(--soft); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }

/* ── PHOTO UPLOAD ── */
.photo-grid { display: grid; gap: 12px; }
.photo-grid-1 { grid-template-columns: 1fr; }
.photo-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
@media(max-width:500px){ .photo-grid-3 { grid-template-columns: 1fr 1fr; } }

.photo-slot {
  position: relative; border-radius: 10px; overflow: hidden;
  background: rgba(255,255,255,0.04); border: 2px dashed rgba(255,255,255,0.12);
  cursor: pointer; transition: border-color 0.2s;
}
.photo-slot:hover { border-color: rgba(45,212,191,0.4); }
.photo-slot.hero  { aspect-ratio: 3/2; }
.photo-slot.thumb { aspect-ratio: 1/1; }
.photo-slot.cover-slot { aspect-ratio: 1/1; max-width: 340px; width: 100%; }
.photo-slot.teaser-slot { position: absolute; inset: 0; border-radius: 0; border: none; background: transparent; z-index: 1; }
.photo-slot.teaser-slot:hover { border-color: transparent; }
.photo-slot.teaser-slot .photo-slot-inner { justify-content: center; font-size: 0.42rem; }
.photo-slot input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 5; }
.photo-slot-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; height: 100%; padding: 16px; pointer-events: none; }
.photo-slot-inner .icon { font-size: 1.4rem; color: var(--muted); }
.photo-slot-inner .label { font-size: 0.75rem; color: var(--muted); text-align: center; font-family: 'Montserrat', sans-serif; font-weight: 600; }
.photo-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.photo-slot .remove-btn {
  position: absolute; top: 6px; right: 6px; width: 26px; height: 26px;
  background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: #fff;
  font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  z-index: 10;
}
.photo-slot .remove-btn:hover { background: rgba(244,63,94,0.85); }
.photo-slot .role-tag {
  position: absolute; bottom: 6px; left: 6px;
  background: rgba(0,0,0,0.65); color: rgba(255,255,255,0.8);
  font-size: 0.65rem; font-family: 'Montserrat', sans-serif; font-weight: 700;
  padding: 2px 7px; border-radius: 4px; pointer-events: none;
}
.btn-generate { background: none; border: 1px solid rgba(45,212,191,0.35); color: var(--teal); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.72rem; border-radius: 7px; padding: 6px 14px; cursor: pointer; transition: background 0.15s, border-color 0.15s; margin-top: 8px; }
.btn-generate:hover { background: rgba(45,212,191,0.1); border-color: var(--teal); }
.btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
.pos-btns { position: absolute; bottom: 6px; left: 6px; display: flex; gap: 2px; z-index: 11; pointer-events: all; }
.pos-btns button { width: 20px; height: 20px; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.25); border-radius: 4px; color: rgba(255,255,255,0.8); font-size: 0.6rem; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.pos-btns button:hover { background: rgba(45,212,191,0.4); }
.pos-btns button.pos-active { background: var(--teal); color: #0d1520; border-color: var(--teal); }

/* ── FIELDS ── */
.field { margin-bottom: 16px; }
.field label { display: block; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.72rem; color: var(--soft); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.field input, .field textarea, .field select {
  width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 9px; padding: 10px 14px; color: var(--text); font-family: 'Open Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: rgba(45,212,191,0.45); }
.field textarea { resize: vertical; min-height: 90px; line-height: 1.65; }
.field .hint { font-size: 0.75rem; color: var(--muted); margin-top: 5px; }

/* ── DAY HEADER ── */
.day-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--bd); }
.day-num { width: 44px; height: 44px; border-radius: 10px; background: rgba(45,212,191,0.1); border: 1px solid rgba(45,212,191,0.25); display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 0.85rem; color: var(--teal); flex-shrink: 0; }
.day-info h3 { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1rem; color: #fff; }
.day-info p  { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

/* ── CONTRIBUTOR ROW ── */
.contrib-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.contrib-pill { font-size: 0.72rem; font-family: 'Montserrat', sans-serif; font-weight: 700; padding: 4px 12px; border-radius: 20px; border: 1px solid; cursor: pointer; transition: background 0.15s; }
.contrib-pill.traveler { border-color: rgba(45,212,191,0.35); color: var(--teal); background: rgba(45,212,191,0.06); }
.contrib-pill.guide    { border-color: rgba(245,158,11,0.35); color: var(--gold); background: rgba(245,158,11,0.06); }
.contrib-pill.lodge    { border-color: rgba(167,139,250,0.35); color: #a78bfa; background: rgba(167,139,250,0.06); }
.contrib-pill.active   { background: rgba(45,212,191,0.18) !important; border-color: var(--teal) !important; }

/* ── NAV BUTTONS ── */
.step-nav { display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--bd); }
.btn-back { background: none; border: 1px solid rgba(255,255,255,0.15); color: var(--soft); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.88rem; border-radius: 9px; padding: 11px 24px; cursor: pointer; transition: border-color 0.2s; }
.btn-back:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
.btn-next { background: var(--teal); color: #0d1520; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.88rem; border: none; border-radius: 9px; padding: 11px 28px; cursor: pointer; transition: background 0.2s; }
.btn-next:hover { background: #5eead4; }
.btn-preview { background: linear-gradient(135deg, var(--teal), #5eead4); color: #0d1520; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 0.95rem; border: none; border-radius: 9px; padding: 12px 32px; cursor: pointer; }

/* ══════════════════════════════════════════
   BOOK PREVIEW
   ══════════════════════════════════════════ */
:root { --texture-url: none; }
#preview-view { display: none; }
.book-wrap { max-width: 700px; margin: 0 auto; }

/* Blurred photo texture — applied to text pages only */
/* ── BOOK PREVIEW — Page Model ─────────────────────────────────────────── */
.book-preview { max-width: 680px; margin: 0 auto; }

/* Cover: portrait (2:3), right-hand only */
.pg-cover-wrap { display: flex; justify-content: center; margin-bottom: 4px; }
.pg-cover {
  position: relative; aspect-ratio: 1/1; width: 50%; overflow: hidden;
  background: #0a1018; border-radius: 3px;
  box-shadow: 4px 4px 24px rgba(0,0,0,0.6);
}

/* Spread pair */
.pg-pair {
  position: relative; display: grid; grid-template-columns: 1fr 1fr;
  gap: 3px; margin-bottom: 3px;
}
.pg-pair::after {
  content: ''; position: absolute; top: 0; bottom: 0; left: calc(50% - 1px);
  width: 2px; background: rgba(0,0,0,0.55); z-index: 10; pointer-events: none;
}

/* Single page — square */
.pg {
  position: relative; aspect-ratio: 1/1; overflow: hidden;
  background: #0f1924; border-radius: 2px;
}

/* Blurred texture background */
.pg-tex {
  position: absolute; inset: -28px; z-index: 0; pointer-events: none;
}
.pg-tex img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  filter: blur(28px) saturate(0.3) brightness(0.6);
  opacity: 0.38;
}

/* Content layer */
.pg-body {
  position: absolute; inset: 0; z-index: 1;
  padding: 14px; display: flex; flex-direction: column; overflow: hidden;
}

/* Gradient overlay for photo pages */
.pg-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.12) 55%, transparent 100%);
}
.pg-overlay-text {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 14px; z-index: 2;
}

/* Typography */
.pg-eyebrow {
  font-family: 'Montserrat', sans-serif; font-weight: 700;
  font-size: 0.82rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--teal); margin-bottom: 3px;
}
.pg-title {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: 1.5rem; color: #fff; line-height: 1.2; margin-bottom: 5px;
}
.pg-text {
  font-family: 'Open Sans', sans-serif;
  font-size: 0.67rem; color: var(--soft); line-height: 1.7; flex: 1; min-height: 0; overflow: hidden;
}
.pg-quote {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 0.75rem; color: var(--text); line-height: 1.6;
  border-left: 2px solid var(--teal); padding-left: 8px; margin-top: 6px;
  min-height: 0; overflow: hidden;
}

/* Photo fills */
.pg-photo-abs { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
.pg-map-abs { position: absolute; inset: 10px; width: calc(100% - 20px); height: calc(100% - 20px); object-fit: cover; z-index: 0; border-radius: 4px; }
.pg-photo-top { width: 100%; object-fit: cover; border-radius: 2px; flex-shrink: 0; display: block; }
.pg-photo-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; flex-shrink: 0; margin-top: 2px; }
.pg-photo-pair img { width: 100%; object-fit: cover; border-radius: 2px; display: block; }

/* Blank page */
.pg-blank { background: #0c1520; }

/* Page number */
.pg-num {
  position: absolute; bottom: 7px; right: 9px; z-index: 5;
  font-family: 'Montserrat', sans-serif; font-size: 0.5rem;
  color: rgba(255,255,255,0.22); font-weight: 600; letter-spacing: 0.05em;
}

@media(max-width:580px) {
  .pg-pair { grid-template-columns: 1fr; gap: 6px; margin-bottom: 6px; }
  .pg-pair::after { display: none; }
  .pg-cover { width: 88%; }
  .pg-cover-wrap { margin-bottom: 6px; }
  .pg-eyebrow  { font-size: 0.55rem !important; }
  .pg-title    { font-size: 1.3rem  !important; }
  .pg-text     { font-size: 0.62rem !important; }
  .pg-quote    { font-size: 0.62rem !important; }
  .pg-num      { font-size: 0.52rem !important; }
  .pg-overlay-text { padding: 10px 12px !important; }
}

.preview-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 40px; padding-top: 28px; border-top: 1px solid var(--bd); }
.btn-order { background: var(--gold); color: #0d1520; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 0.95rem; border: none; border-radius: 10px; padding: 13px 32px; cursor: pointer; transition: background 0.2s; }
.btn-order:hover { background: #fbbf24; }
.btn-share { background: none; border: 1px solid rgba(45,212,191,0.4); color: var(--teal); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.88rem; border-radius: 10px; padding: 12px 24px; cursor: pointer; }
.btn-edit  { background: none; border: 1px solid rgba(255,255,255,0.15); color: var(--soft); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.88rem; border-radius: 10px; padding: 12px 24px; cursor: pointer; }
.btn-read  { background: none; border: 1px solid rgba(45,212,191,0.4); color: var(--teal); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.88rem; border-radius: 10px; padding: 12px 24px; cursor: pointer; }

/* ── Photo Mode ── */
body.photo-mode .topbar-save { display: none; }
body.photo-mode #sidebar     { display: none !important; }
body.photo-mode .main        { max-width: none; padding: 0; }
#photo-mode { display: none; padding-top: 60px; min-height: 100vh; padding-bottom: 90px; }
.pm-subhead {
  position: sticky; top: 60px; z-index: 50;
  background: rgba(13,21,32,0.97); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px;
}
.pm-trip-name { font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.85rem; color:var(--teal); }
.pm-count     { font-family:'Montserrat',sans-serif; font-weight:600; font-size:0.78rem; color:var(--soft); }
.pm-section   { padding: 18px 16px 0; }
.pm-section-title {
  font-family:'Montserrat',sans-serif; font-weight:700;
  font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--soft); margin-bottom:10px;
  padding-bottom:6px; border-bottom:1px solid var(--bd);
}
.pm-slots-row    { display:grid; grid-template-columns:2fr 1fr 1fr; gap:8px; }
.pm-slots-single { max-width:260px; }
.pm-done-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(13,21,32,0.97); border-top:1px solid var(--bd);
  padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.pm-done-note { font-size:0.78rem; color:var(--muted); }
.pm-done-btn  {
  background:var(--teal); color:#0d1520;
  font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.88rem;
  border:none; border-radius:8px; padding:11px 22px; cursor:pointer; white-space:nowrap;
}

/* ── Read-only mode ── */
body.read-mode .topbar-save,
body.read-mode #sidebar,
body.read-mode .step-header,
body.read-mode .btn-edit,
body.read-mode .btn-order,
body.read-mode #pdf-hint { display: none !important; }
body.read-mode .preview-actions { border-top: none; margin-top: 20px; padding-top: 0; }

/* ── Full-screen reader ── */
#reader-overlay {
  display: none; position: fixed; inset: 0; background: #070d14; z-index: 1000;
  flex-direction: column; align-items: center; justify-content: center;
}
#reader-overlay.open { display: flex; }
#reader-spread {
  display: flex; gap: 3px; max-height: calc(100vh - 90px);
  align-items: center; justify-content: center;
}
#reader-spread .pg { flex: 0 0 auto; height: min(calc(100vh - 90px), 90vw); width: min(calc(100vh - 90px), 90vw); }
@media(min-width:700px) {
  #reader-spread .pg { height: min(calc(100vh - 90px), 45vw); width: min(calc(100vh - 90px), 45vw); }
}
#reader-spread .pg-cover { height: min(calc(100vh - 90px), 90vw); width: min(calc(100vh - 90px), 90vw); }
@media(min-width:700px) {
  #reader-spread .pg-cover { height: min(calc(100vh - 90px), 45vw); width: min(calc(100vh - 90px), 45vw); }
}
.reader-controls {
  display: flex; align-items: center; gap: 20px; padding: 14px 0 0;
}
.reader-btn {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 1.1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.reader-btn:hover { background: rgba(45,212,191,0.2); border-color: var(--teal); }
.reader-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.reader-page-label { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.75rem; color: var(--muted); min-width: 80px; text-align: center; }
.reader-close { position: fixed; top: 16px; right: 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; font-size: 1rem; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1001; }

/* ── PDF print ── */
#pdf-hint { display:none; }

@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  html { font-size: 40px; }
  body { background: #000 !important; margin: 0 !important; padding: 0 !important; }

  .topbar, #sidebar, .mobile-progress, #wizard-view,
  .step-header, .preview-actions, #reader-overlay, #pdf-hint { display: none !important; }

  .layout { display: block !important; padding: 0 !important; }
  .main   { padding: 0 !important; max-width: none !important; }
  #preview-view { display: block !important; padding: 0 !important; }

  .book-wrap, .book-preview { max-width: none !important; margin: 0 !important; padding: 0 !important; }

  /* Cover: centered on its spread */
  .pg-cover-wrap {
    display: flex !important; justify-content: center !important; align-items: center !important;
    margin: 0 !important; background: #000 !important;

// ── STEPS LIST ─────────────────────────────────────────────────────────────

    steps.push({ id: 'day-' + i, label: 'Day ' + d.num + ' — ' + d.location.split(' → ')[0], section: i === 0 ? 'Day Chapters' : null, render: () => renderDay(i) });

  steps.push({ id: 'company', label: 'Guide & Company',   section: null,          render: renderCompany });

const STEPS = buildSteps();

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function renderSidebar() {
  const sb = document.getElementById('sidebar');

  sb.innerHTML = STEPS.map((s, i) => {
    let html = '';
    if (s.section && s.section !== lastSection) {

  }).join('');

function isStepDone(i) {
  if (i === 0) return !!STATE.cover.photoUrl || !!STATE.cover.title;
  if (i === 1) return !!STATE.opening.introText;
  if (i >= 2 && i <= 2 + TRIP.days.length - 1) {
    const d = STATE.days[i - 2];
    return !!d.heroUrl || !!d.reflection;

  if (i === 2 + TRIP.days.length + 1) return !!STATE.company.photoUrl || !!STATE.company.guideNote;

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function goToStep(i) {
  STATE.currentStep = Math.max(0, Math.min(STEPS.length - 1, i));
  document.getElementById('wizard-view').style.display  = 'block';
  document.getElementById('preview-view').style.display = 'none';

function nextStep() {
  if (STATE.currentStep < STEPS.length - 1) goToStep(STATE.currentStep + 1);

function prevStep() {
  if (STATE.currentStep > 0) goToStep(STATE.currentStep - 1);
}

function renderStep() {
  renderSidebar();
  updateProgress();

}

function photoPos(id) { return (STATE.positions && STATE.positions[id]) || 'center center'; }

function posButtons(id) {
  const cur = photoPos(id);

    .map(([v,l]) => `<button class="${cur===v?'pos-active':''}" onclick="setPhotoPos('${id}','${v}')" title="${v}">${l}</button>`)

}

function setPhotoPos(id, pos) {
  STATE.positions[id] = pos;

function photoSlotHtml(id, cls, label, existingUrl, roleTag) {
  const pos     = photoPos(id);
  const img     = existingUrl ? `<img src="${existingUrl}" alt="" style="object-position:${pos};" />` : '';
  const remove  = existingUrl ? `<button class="remove-btn" onclick="removePhoto(event,'${id}')" title="Remove photo">✕</button>` : '';
  const tag     = roleTag ? `<div class="role-tag">${roleTag}</div>` : '';
  const pos_btns = existingUrl ? posButtons(id) : '';
  const inner   = !existingUrl ? `<div class="photo-slot-inner"><div class="icon">📷</div><div class="label">${label}</div></div>` : '';
  return `<div class="photo-slot ${cls}" id="slot-${id}">
    <input type="file" accept="image/*" onchange="handlePhoto(event,'${id}')" />
    ${inner}${img}${remove}${tag}${pos_btns}
  </div>`;
}

async function compressImage(file, maxDim = 2048, quality = 0.85) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width <= maxDim && height <= maxDim) { resolve(file); return; }
      const scale = maxDim / Math.max(width, height);
      width = Math.round(width * scale); height = Math.round(height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => resolve(blob || file), 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
    img.src = url;
  });
}

async function uploadToCloudinary(file) {
  const compressed = await compressImage(file);
  const folder = 'journey-books/' + SESSION_ID;
  const fd = new FormData();
  fd.append('file', compressed, 'photo.jpg');
  fd.append('upload_preset', 'Trip Image');
  fd.append('folder', folder);
  const resp = await fetch('https://api.cloudinary.com/v1_1/dporenlvw/image/upload', { method: 'POST', body: fd });
  const data = await resp.json();
  if (!data.secure_url) throw new Error(data.error?.message || 'Upload failed');
  return data.secure_url;
}

async function handleMultiPhoto(e, dayIndex) {
  const files = Array.from(e.target.files).slice(0, 3);
  if (!files.length) return;
  const slots = ['hero', 'p2', 'p3'];
  const btn = document.getElementById('multi-upload-btn-' + dayIndex);
  if (btn) { btn.disabled = true; btn.textContent = 'Uploading…'; }

  await Promise.all(files.map(async (file, i) => {
    const id = 'day' + dayIndex + '-' + slots[i];
    const slot = document.getElementById('slot-' + id);
    if (slot) slot.innerHTML = `<div class="photo-slot-inner"><div class="icon" style="font-size:1.2rem;">⏳</div><div class="label">Uploading…</div></div>`;
    try {
      const url = await uploadToCloudinary(file);
      storePhotoUrl(id, url);
      if (slot) slot.innerHTML = `
        <input type="file" accept="image/*" onchange="handlePhoto(event,'${id}')" />
        <img src="${url}" alt="" style="object-position:${photoPos(id)};" />
        <button class="remove-btn" onclick="removePhoto(event,'${id}')">✕</button>
        ${posButtons(id)}`;
    } catch(err) {
      if (slot) slot.innerHTML = `<div class="photo-slot-inner"><div class="icon">⚠️</div><div class="label" style="color:#f43f5e;">Failed</div></div><input type="file" accept="image/*" onchange="handlePhoto(event,'${id}')" />`;
    }
  }));

  if (btn) { btn.disabled = false; btn.textContent = '📷 Upload Day Photos'; }
  saveProgress();
}

async function handlePhoto(e, id) {
  const file = e.target.files[0];
  if (!file) return;
  const slot = document.getElementById('slot-' + id);
  if (slot) slot.innerHTML = `<div class="photo-slot-inner"><div class="icon" style="font-size:1.2rem;">⏳</div><div class="label">Uploading…</div></div>`;
  try {
    const url = await uploadToCloudinary(file);
    storePhotoUrl(id, url);
    if (slot) slot.innerHTML = `
      <input type="file" accept="image/*" onchange="handlePhoto(event,'${id}')" />
      <img src="${url}" alt="" style="object-position:${photoPos(id)};" />
      <button class="remove-btn" onclick="removePhoto(event,'${id}')">✕</button>
      ${posButtons(id)}`;
    saveProgress();
  } catch(err) {
    if (slot) slot.innerHTML = `<div class="photo-slot-inner"><div class="icon">⚠️</div><div class="label" style="color:#f43f5e;">Upload failed — tap to retry</div></div><input type="file" accept="image/*" onchange="handlePhoto(event,'${id}')" />`;
  }
}

function storePhotoUrl(id, url) {
  if (document.body.classList.contains('photo-mode')) updatePhotoCount();
  if      (id === 'cover')            STATE.cover.photoUrl       = url;
  else if (id === 'cover-spread')     STATE.cover.spreadPhotoUrl = url;
  else if (id === 'closing')           STATE.closing.photoUrl    = url;
  else if (id === 'closing-portrait')  STATE.closing.portraitUrl  = url;
  else if (id === 'closing-portrait2') STATE.closing.portrait2Url = url;
  else if (id === 'closing-backcover') STATE.closing.backCoverUrl = url;
  else if (id === 'company-1')        STATE.company.photoUrl    = url;
  else if (id === 'company-2')        STATE.company.photo2Url   = url;
  else {
    const m = id.match(/^day(\d+)-(hero|p2|p3)$/);
    if (m) {
      const di = parseInt(m[1]), role = m[2];
      if (role === 'hero') STATE.days[di].heroUrl   = url;
      if (role === 'p2')   STATE.days[di].photo2Url = url;
      if (role === 'p3')   STATE.days[di].photo3Url = url;
    }
    const mt = id.match(/^teaser-(.+)$/);
    if (mt) STATE.teasers[mt[1]] = url;
  }
}

function removePhoto(e, id) {
  e.stopPropagation();
  if      (id === 'cover')            STATE.cover.photoUrl       = null;
  else if (id === 'cover-spread')     STATE.cover.spreadPhotoUrl = null;

  else if (id === 'closing-portrait2') STATE.closing.portrait2Url = null;

  else if (id === 'company-1')        STATE.company.photoUrl    = null;
  else if (id === 'company-2')        STATE.company.photo2Url   = null;
  else {
    const m = id.match(/^day(\d+)-(hero|p2|p3)$/);
    if (m) {
      const di = parseInt(m[1]), role = m[2];
      if (role === 'hero') STATE.days[di].heroUrl   = null;
      if (role === 'p2')   STATE.days[di].photo2Url = null;
      if (role === 'p3')   STATE.days[di].photo3Url = null;

        ${photoSlotHtml('day' + dayIndex + '-hero', 'hero', 'Hero', st.heroUrl, st.heroUrl ? 'Hero' : null)}
        ${photoSlotHtml('day' + dayIndex + '-p2',   'thumb','Photo 2', st.photo2Url, null)}

    ${(() => {
      if (dayIndex === 0) return '';
      const prev = TRIP.days[dayIndex - 1];
      if (!prev || prev.park === d.park) return '';
      const slug = d.park.replace(/[^a-z0-9]/gi, '-').toLowerCase();
      const slotId = 'teaser-' + slug;
      return `<div class="card">
        <div class="card-title">Transition Photo — ${d.park} <span style="font-weight:400;color:var(--muted);font-size:0.75rem;">(optional)</span></div>
        <p style="font-size:0.78rem;color:var(--soft);margin-bottom:14px;">Appears as a full-page photo with "${d.park}" overlaid at the bottom, bridging the two destinations.</p>
        <div style="max-width:220px;">
          ${photoSlotHtml(slotId, 'hero', 'Transition Photo', STATE.teasers[slug] || null, null)}
        </div>
      </div>`;
    })()}
    ${navHtml(false)}`;
}

// ── STEP: PREVIEW TRIGGER ──────────────────────────────────────────────────
function renderPreviewStep() { showPreview(); }

// ── SHOW PREVIEW ───────────────────────────────────────────────────────────
function showPreview() {
  document.getElementById('wizard-view').style.display  = 'none';
  document.getElementById('preview-view').style.display = 'block';
  STATE.currentStep = STEPS.length - 1;
  renderSidebar(); updateProgress();

  const title  = STATE.cover.title || (TRIP.destination + ' · ' + TRIP.traveler + ' · ' + TRIP.year);
  const sub    = STATE.cover.subtitle || 'A Journey Book';
  const texUrl = STATE.cover.photoUrl || ((STATE.days.find(d => d.heroUrl) || {}).heroUrl) || '';

  function texHtml(url) {
    if (!url) return '';
    return `<div class="pg-tex"><img src="${url}" alt="" /></div>`;
  }

  // Group consecutive same-park days into destinations
  function groupDests() {
    const dests = []; let cur = null;
    TRIP.days.forEach((d, i) => {
      if (!cur || cur.park !== d.park) { cur = { park: d.park, days: [] }; dests.push(cur); }
      cur.days.push(Object.assign({}, d, { index: i }));
    });
    return dests;
  }

  // Build flat page list (cover rendered separately)
  const pages = [];
  pages.push({ type: 'spread-L' });
  pages.push({ type: 'spread-R' });
  pages.push({ type: 'intro' });
  pages.push({ type: 'route-map' });

  try {
  groupDests().forEach(dest => {
    if (pages.length % 2 !== 0) pages.push({ type: 'dest-teaser', dest });
    // Use the first day that has a hero photo as the destination opener photo
    const bestHeroDay = dest.days.find(d => STATE.days[d.index].heroUrl);
    const destSt = bestHeroDay ? STATE.days[bestHeroDay.index] : STATE.days[dest.days[0].index];
    const heroSlotId = bestHeroDay ? 'day' + bestHeroDay.index + '-hero' : 'day' + dest.days[0].index + '-hero';
    pages.push({ type: 'dest-title', dest, st: destSt, heroSlotId });
    pages.push({ type: 'dest-map', dest });
    dest.days.forEach((day, di) => {
      const st = STATE.days[day.index];
      // Skip day-photo for the day already used as the destination opener
      const usedAsOpener = bestHeroDay && day.index === bestHeroDay.index;
      if (!usedAsOpener && st.heroUrl) pages.push({ type: 'day-photo', day, st });
      if (st.reflection || st.photo2Url || st.photo3Url) pages.push({ type: 'day-text', day, st });
    });
  });
  } catch(e) { /* day loop guard */ }

  // Safari company / guide spread (always included)
  if (pages.length % 2 !== 0) pages.push({ type: 'blank' });
  pages.push({ type: 'safari-co-L' });
  pages.push({ type: 'safari-co-R' });

  // Closing section
  if (pages.length % 2 !== 0) pages.push({ type: 'blank' });
  // Spread 1: panoramic photo across both pages
  if (STATE.closing.photoUrl) {
    pages.push({ type: 'closing-panorama-L' });
    pages.push({ type: 'closing-panorama-R' });
  }
  // Spread 2: text (left) + dual portraits (right)
  pages.push({ type: 'closing-text' });
  pages.push({ type: 'closing-portraits' });
  // Back cover (standalone right-hand page)
  if (STATE.closing.backCoverUrl || STATE.closing.backCoverText) {
    if (pages.length % 2 !== 0) pages.push({ type: 'blank' });
    pages.push({ type: 'back-cover' });
  }

  // Render a single page
  function renderPage(p, idx) {
    const num = `<div class="pg-num">${idx + 2}</div>`;

    switch (p.type) {
      case 'blank':
        return `<div class="pg pg-blank">${num}</div>`;

      case 'dest-teaser': {
        const { dest } = p;
        const slug = dest.park.replace(/[^a-z0-9]/gi, '-').toLowerCase();
        const slotId = 'teaser-' + slug;
        const photoUrl = STATE.teasers[slug];
        return `<div class="pg" style="position:relative;overflow:hidden;">
          ${texHtml(texUrl)}
          ${photoSlotHtml(slotId, 'teaser-slot', '＋ Add Photo', photoUrl, null)}
          <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.1) 55%,transparent 100%);pointer-events:none;z-index:3;"></div>
          <div class="pg-body" style="justify-content:flex-end;z-index:6;pointer-events:none;">
            <div class="pg-eyebrow" style="font-size:0.52rem;letter-spacing:0.18em;">UP NEXT</div>
            <div class="pg-title" style="font-size:0.95rem;line-height:1.2;">${dest.park}</div>
          </div>
          ${num}</div>`;
      }

      case 'spread-L': {
        const sp = STATE.cover.spreadPhotoUrl || STATE.cover.photoUrl;
        if (!sp) return `<div class="pg"></div>`;
        return `<div class="pg"><div style="position:absolute;top:0;left:0;width:200%;height:100%;background:url('${sp}') center/cover no-repeat;"></div></div>`;
      }

      case 'spread-R': {
        const sp = STATE.cover.spreadPhotoUrl || STATE.cover.photoUrl;
        if (!sp) return `<div class="pg"></div>`;
        return `<div class="pg">
          <div style="position:absolute;top:0;right:0;width:200%;height:100%;background:url('${sp}') center/cover no-repeat;"></div>
          <div class="pg-overlay" style="background:linear-gradient(to bottom,rgba(0,0,0,0.4) 0%,transparent 100%);"></div>
          <div style="position:absolute;top:12px;right:12px;z-index:2;"><div class="pg-eyebrow">${TRIP.year}</div></div>
        </div>`;
      }

      case 'intro': {
        const n = TRIP.days.length;
        const tf  = n <= 8  ? '0.72rem' : n <= 13 ? '0.56rem' : '0.42rem';
        const thf = n <= 8  ? '0.62rem' : n <= 13 ? '0.48rem' : '0.36rem';
        const rp  = n <= 8  ? '3px 4px' : n <= 13 ? '2px 4px' : '1px 4px';
        const rows = TRIP.days.map((d, i) =>
          `<tr style="background:${i % 2 === 0 ? 'rgba(255,255,255,0.025)' : 'transparent'};">` +
          `<td style="font-family:'Montserrat';font-weight:700;font-size:${tf};color:var(--teal);padding:${rp};">${d.num}</td>` +
          `<td style="font-size:${tf};color:var(--soft);padding:${rp};font-family:'Open Sans';white-space:nowrap;">${d.date.split(', ').pop()}</td>` +
          `<td style="font-size:${tf};color:var(--text);padding:${rp};font-family:'Open Sans';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.location.split(' → ').pop()}</td>` +
          `<td style="font-size:${tf};color:var(--soft);padding:${rp};font-family:'Open Sans';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic;">${d.lodge || ''}</td>` +
          `</tr>`
        ).join('');
        const thStyle = `font-family:'Montserrat';font-weight:700;font-size:${thf};color:var(--teal);text-transform:uppercase;letter-spacing:0.09em;padding:0 4px 5px;text-align:left;`;
        const table = `<table style="width:100%;border-collapse:collapse;margin-top:auto;table-layout:fixed;">
          <colgroup><col style="width:10%;"><col style="width:18%;"><col style="width:36%;"><col style="width:36%;"></colgroup>
          <thead><tr style="border-bottom:1px solid rgba(45,212,191,0.3);">
            <th style="${thStyle}">Day</th>
            <th style="${thStyle}">Date</th>
            <th style="${thStyle}">Destination</th>
            <th style="${thStyle}">Lodge</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
        return `<div class="pg">${texHtml(texUrl)}<div class="pg-body">
          <div class="pg-eyebrow">${TRIP.destination} · ${TRIP.year}</div>
          <div class="pg-title">${title}</div>
          ${STATE.opening.introText
            ? `<div class="pg-text" style="margin-top:8px;">${STATE.opening.introText}</div>`
            : '<div style="flex:1;"></div>'}
          <div style="margin-top:auto;padding-top:8px;">${table}</div>
          </div>${num}</div>`;
      }

      case 'route-map': {
        // Build unique parks with coordinates from TRIP.days
        const seen = new Set();
        const parkList = [];
        TRIP.days.forEach(d => {
          if (d.park && !seen.has(d.park)) {
            seen.add(d.park);
            parkList.push({ park: d.park, lon: d.lon, lat: d.lat });
          }
        });
        const pinsWithCoords = parkList.filter(p => p.lon && p.lat);
        const pinStr = pinsWithCoords.map((p, i) => `pin-s-${i + 1}+000000(${p.lon},${p.lat})`).join(',');
        const mapSrc = window._mapboxToken && pinStr
          ? `https://api.mapbox.com/styles/v1/${mapboxStyle()}/static/${pinStr}/auto/600x600@2x?padding=50&access_token=${window._mapboxToken}`
          : (window._mapboxToken
            ? `https://api.mapbox.com/styles/v1/${mapboxStyle()}/static/31.0,0.5,6.2/600x600@2x?access_token=${window._mapboxToken}`
            : '');
        const legend = parkList.map((p, i) =>
          `<div style="display:flex;align-items:baseline;gap:4px;margin-bottom:2px;">
            <span style="font-family:'Montserrat';font-weight:700;font-size:0.42rem;color:var(--teal);flex-shrink:0;">${i + 1}</span>
            <span style="font-size:0.42rem;color:rgba(255,255,255,0.8);font-family:'Montserrat';font-weight:600;letter-spacing:0.04em;text-transform:uppercase;">${p.park}</span>
          </div>`
        ).join('');
        return `<div class="pg">
          <img id="route-map-img" src="${mapSrc}" class="pg-map-abs" alt="Route map" style="${mapSrc ? '' : 'display:none;'}" />
          ${!mapSrc ? texHtml(texUrl) : ''}
          <div class="pg-overlay" style="background:linear-gradient(to bottom,rgba(0,0,0,0.5) 0%,transparent 40%,transparent 50%,rgba(0,0,0,0.75) 100%);"></div>
          <div style="position:absolute;top:10px;left:12px;z-index:2;"><div class="pg-eyebrow">${TRIP.destination} Circuit</div></div>
          <div class="pg-overlay-text" style="padding:10px 12px;">${legend}</div>
          ${num}</div>`;
      }

      case 'dest-title': {
        const { dest, st, heroSlotId } = p;
        const d0 = dest.days[0], dZ = dest.days[dest.days.length - 1];
        const lodge = d0.lodge || '';
        const heroUrl = st && st.heroUrl;
        return `<div class="pg">
          ${heroUrl
            ? `<img src="${heroUrl}" class="pg-photo-abs" id="pgimg-${heroSlotId}" style="object-position:${photoPos(heroSlotId)};" alt="${dest.park}" />
               <div class="pg-overlay" style="background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.15) 65%,transparent 100%);"></div>`
            : texHtml(texUrl)}
          <div class="pg-body" style="justify-content:flex-end;">
            <div style="flex:1;"></div>
            <div class="pg-eyebrow">${d0.date.split(', ').pop()}${dZ !== d0 ? ' – ' + dZ.date.split(', ').pop() : ''}</div>
            <div class="pg-title" style="font-size:1.05rem;line-height:1.2;">${dest.park}</div>
            <div style="margin-top:5px;font-size:0.48rem;color:rgba(255,255,255,0.55);font-family:'Open Sans';">Day${dest.days.length > 1 ? 's' : ''} ${d0.num}${dest.days.length > 1 ? '–' + dZ.num : ''} · ${dest.days.length} night${dest.days.length > 1 ? 's' : ''}</div>
            ${lodge ? `<div style="margin-top:4px;font-size:0.46rem;color:rgba(45,212,191,0.8);font-family:'Open Sans';font-style:italic;">${lodge}</div>` : ''}
          </div>${num}</div>`;
      }

      case 'dest-map': {
        const { dest } = p;
        const d0 = dest.days[0];
        const mapId = 'dest-map-' + dest.park.replace(/[^a-z0-9]/gi, '-').toLowerCase();
        let mapSrc = '';
        if (window._mapboxToken && d0.lon && d0.lat) {
          const pin = `pin-s+000000(${d0.lon},${d0.lat})`;
          mapSrc = `https://api.mapbox.com/styles/v1/${mapboxStyle()}/static/${pin}/${d0.lon},${d0.lat},${d0.zoom || 7}/600x600@2x?access_token=${window._mapboxToken}`;
        }
        return `<div class="pg" style="background:#0d1c2e;">
          ${mapSrc
            ? `<img id="${mapId}" src="${mapSrc}" class="pg-map-abs" alt="Map of ${dest.park}" />`
            : `<div class="pg-body" style="align-items:center;justify-content:center;flex-direction:column;gap:6px;">
                 <img id="${mapId}" src="" style="display:none;position:absolute;inset:10px;width:calc(100% - 20px);height:calc(100% - 20px);object-fit:cover;border-radius:4px;" alt="" />
                 <div style="font-size:1.2rem;">📍</div>
                 <div style="font-size:0.5rem;color:var(--soft);font-family:'Montserrat';font-weight:700;">${dest.park}</div>
                 <div style="font-size:0.4rem;color:var(--muted);font-style:italic;">Map loading…</div>
               </div>`}
          <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,0.65) 0%,transparent 60%);padding:8px 8px 6px;z-index:2;">
            <div style="font-family:'Montserrat';font-weight:700;font-size:0.38rem;color:rgba(45,212,191,0.9);text-transform:uppercase;letter-spacing:0.1em;">${dest.park}</div>
          </div>
          ${num}</div>`;
      }

      case 'day-photo': {
        const { day, st } = p;
        const heroId = 'day' + day.index + '-hero';
        return `<div class="pg">
          <img src="${st.heroUrl}" class="pg-photo-abs" id="pgimg-${heroId}" style="object-position:${photoPos(heroId)};" alt="Day ${day.num}" />
          <div class="pg-overlay"></div>
          <div class="pg-overlay-text">
            <div class="pg-eyebrow">Day ${day.num}</div>
            <div style="font-size:0.48rem;color:rgba(255,255,255,0.7);font-family:'Open Sans';">${day.location}</div>
          </div>${num}</div>`;
      }

      case 'day-text': {
        const { day, st } = p;
        const hasSupport = st.photo2Url || st.photo3Url;
        return `<div class="pg">${texHtml(st.heroUrl || texUrl)}<div class="pg-body">
          <div class="pg-eyebrow">Day ${day.num} · ${day.location.split(' → ').pop()}</div>
          ${hasSupport ? `<div class="pg-photo-pair" style="height:42%;margin-top:6px;">
            ${st.photo2Url ? `<img src="${st.photo2Url}" id="pgimg-day${day.index}-p2" style="height:100%;object-fit:cover;object-position:${photoPos('day'+day.index+'-p2')};" alt="" />` : '<div style="background:rgba(255,255,255,0.03);"></div>'}
            ${st.photo3Url ? `<img src="${st.photo3Url}" id="pgimg-day${day.index}-p3" style="height:100%;object-fit:cover;object-position:${photoPos('day'+day.index+'-p3')};" alt="" />` : '<div style="background:rgba(255,255,255,0.03);"></div>'}
          </div>` : ''}
          ${st.reflection ? `<div class="pg-quote" style="margin-top:${hasSupport ? '8px' : 'auto'};">${st.reflection}</div>` : ''}
          </div>${num}</div>`;
      }

      case 'safari-co-L': {
        const g = TRIP.guide || {};
        return `<div class="pg">${STATE.company.photoUrl
          ? `<img src="${STATE.company.photoUrl}" class="pg-photo-abs" id="pgimg-company-1" style="object-position:${photoPos('company-1')};" alt="Safari company" />
             <div class="pg-overlay"></div>
             <div class="pg-overlay-text">
               <div class="pg-eyebrow">Your Safari</div>
               <div style="font-size:0.5rem;color:rgba(255,255,255,0.7);font-family:'Open Sans';">${g.company || ''}</div>
             </div>`
          : `${texHtml(texUrl)}<div class="pg-body" style="align-items:center;justify-content:center;">
               <div style="font-size:0.6rem;color:var(--muted);font-style:italic;">Add a photo from your guide</div>
             </div>`}${num}</div>`;
      }

      case 'safari-co-R': {
        const g = TRIP.guide || {};
        return `<div class="pg">${STATE.company.photo2Url

            : `<div style="font-size:0.55rem;color:var(--muted);margin-top:8px;font-style:italic;">Your closing reflection will appear here.</div>`}
          </div>${num}</div>`;

      case 'closing-portraits': {
        const p1 = STATE.closing.portraitUrl;
        const p2 = STATE.closing.portrait2Url;
        function portraitBox(url, name, slotId) {
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;">
            <div style="width:100%;aspect-ratio:3/4;overflow:hidden;border-radius:4px;box-shadow:0 3px 14px rgba(0,0,0,0.5);background:#0d1520;">
              ${url ? `<img src="${url}" id="pgimg-${slotId}" style="width:100%;height:100%;object-fit:cover;object-position:${photoPos(slotId)};" alt="${name}" />` : ''}
            </div>
            <div style="font-family:'Montserrat';font-weight:700;font-size:0.42rem;color:var(--soft);letter-spacing:0.06em;text-transform:uppercase;">${name}</div>
          </div>`;
        }
        return `<div class="pg">${texHtml(texUrl)}<div class="pg-body" style="justify-content:center;gap:10px;">
          <div style="flex:1;"></div>
          <div style="display:flex;gap:8px;width:100%;">
            ${portraitBox(p1, TRIP.traveler || 'Traveler', 'closing-portrait')}
            ${portraitBox(p2, 'Travel Partner', 'closing-portrait2')}
          </div>
          <div style="font-size:0.42rem;color:var(--muted);text-align:center;padding-top:4px;">${TRIP.destination} · ${TRIP.year}</div>
          </div>${num}</div>`;
      }

      case 'back-cover':
        return `<div class="pg">
          ${STATE.closing.backCoverUrl
            ? `<img src="${STATE.closing.backCoverUrl}" class="pg-photo-abs" id="pgimg-closing-backcover" style="object-position:${photoPos('closing-backcover')};" alt="" />`
            : texHtml(texUrl)}
          <div class="pg-overlay" style="background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.3) 55%,rgba(0,0,0,0.15) 100%);"></div>
          <div class="pg-body" style="justify-content:flex-end;">
            <div style="flex:1;"></div>
            ${STATE.closing.backCoverText
              ? `<div class="pg-quote" style="font-style:italic;line-height:1.55;">${STATE.closing.backCoverText}</div>`
              : `<div style="font-size:0.48rem;color:var(--muted);font-style:italic;">Closing crescendo will appear here.</div>`}
            <div style="margin-top:14px;font-family:'Montserrat';font-weight:700;font-size:0.38rem;color:rgba(255,255,255,0.3);letter-spacing:0.2em;text-transform:uppercase;">Transformed by Travels</div>
          </div>${num}</div>`;

      default:
        return `<div class="pg pg-blank">${num}</div>`;
    }
  }


  // Assemble full book HTML
  let html = '<div class="book-preview">';

  // Cover (standalone portrait, right-hand)
  html += `<div class="pg-cover-wrap">
    <div class="pg-cover">
      ${STATE.cover.photoUrl ? `<img src="${STATE.cover.photoUrl}" class="pg-photo-abs" id="pgimg-cover" style="object-position:${photoPos('cover')};" alt="cover" />` : ''}
      <div class="pg-overlay"></div>
      <div class="pg-overlay-text" style="padding:20px;">
        <div class="pg-eyebrow">Journey Book · ${TRIP.destination}</div>
        <div class="pg-title" style="font-size:1.25rem;">${title}</div>
        <div style="font-size:0.55rem;color:rgba(255,255,255,0.6);margin-top:4px;">${sub}</div>
      </div>
      <div style="position:absolute;bottom:14px;left:0;right:0;text-align:center;z-index:2;font-family:'Montserrat';font-weight:700;font-size:0.42rem;color:rgba(255,255,255,0.28);letter-spacing:0.18em;text-transform:uppercase;">Transformed by Travels</div>
    </div>
  </div>`;

  // Pair pages into spreads
  for (let i = 0; i < pages.length; i += 2) {
    let leftHtml = '', rightHtml = '';
    try { leftHtml  = renderPage(pages[i], i); } catch(e) { leftHtml = '<div class="pg pg-blank"></div>'; }
    try { rightHtml = pages[i+1] ? renderPage(pages[i+1], i+1) : '<div class="pg pg-blank"></div>'; } catch(e) { rightHtml = '<div class="pg pg-blank"></div>'; }
    html += `<div class="pg-pair">${leftHtml}${rightHtml}</div>`;
  }

  html += '</div>';
  document.getElementById('book-preview-content').innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // Geocode and inject maps now that preview DOM exists and TRIP data is final
  if (window._mapboxToken) injectMaps();
}

// ── FULL-SCREEN READER ────────────────────────────────────────────────────────
let READER_PAGES = [];   // flat list of rendered page HTML strings
let READER_IDX   = 0;   // current spread index (0 = cover, 1 = spread 0-1, etc.)

function buildReaderPages() {
  // Mirrors the page array built in showPreview — cover + spreads
  const pages = [];
  const title  = STATE.cover.title || (TRIP.destination + ' · ' + TRIP.traveler + ' · ' + TRIP.year);
  const sub    = STATE.cover.subtitle || 'A Journey Book';
  const texUrl = STATE.cover.photoUrl || ((STATE.days.find(d => d.heroUrl) || {}).heroUrl) || '';
  function texHtml(url) {
    if (!url) return '';
    return `<div class="pg-tex"><img src="${url}" alt="" /></div>`;
  }

  // Cover (standalone)
  const coverHtml = `<div class="pg-cover">
    ${STATE.cover.photoUrl ? `<img src="${STATE.cover.photoUrl}" class="pg-photo-abs" style="object-position:${photoPos('cover')};" alt="" />` : texHtml(texUrl)}
    <div class="pg-overlay"></div>
    <div class="pg-overlay-text" style="padding:20px;">
      <div class="pg-eyebrow">Journey Book · ${TRIP.destination}</div>
      <div class="pg-title" style="font-size:1.25rem;">${title}</div>
      <div style="font-size:0.55rem;color:rgba(255,255,255,0.6);margin-top:4px;">${sub}</div>
    </div>
    <div style="position:absolute;bottom:14px;left:0;right:0;text-align:center;z-index:2;font-family:'Montserrat';font-weight:700;font-size:0.42rem;color:rgba(255,255,255,0.28);letter-spacing:0.18em;text-transform:uppercase;">Transformed by Travels</div>
  </div>`;
  pages.push({ cover: true, html: coverHtml });

  // Re-use the preview page list from the DOM — grab all .pg elements
  const previewPgs = document.querySelectorAll('#book-preview-content .pg, #book-preview-content .pg-cover');
  previewPgs.forEach(el => {
    if (el.classList.contains('pg-cover')) return; // already added above
    pages.push({ cover: false, html: el.outerHTML });
  });

  return pages;
}

function openReader() {
  READER_PAGES = buildReaderPages();
  READER_IDX   = 0;
  document.getElementById('reader-overlay').classList.add('open');
  readerRender();
}

function closeReader() {
  document.getElementById('reader-overlay').classList.remove('open');
}

function readerNav(dir) {
  // Cover occupies one slot; rest are pairs
  const total = readerTotalSpreads();
  READER_IDX = Math.max(0, Math.min(total - 1, READER_IDX + dir));
  readerRender();
}

function readerTotalSpreads() {
  if (READER_PAGES.length === 0) return 0;
  // Cover is 1, then pairs of remaining pages
  const rest = READER_PAGES.length - 1;
  return 1 + Math.ceil(rest / 2);
}

function readerRender() {
  const spread = document.getElementById('reader-spread');
  const label  = document.getElementById('reader-label');
  const prev   = document.getElementById('reader-prev');
  const next   = document.getElementById('reader-next');
  const total  = readerTotalSpreads();

  spread.innerHTML = '';

  if (READER_IDX === 0) {
    // Cover — single centered page
    spread.innerHTML = READER_PAGES[0].html;
    label.textContent = 'Cover';
  } else {
    // Spread: pages are at indices 1 + (READER_IDX-1)*2 and +1
    const li = 1 + (READER_IDX - 1) * 2;
    const ri = li + 1;
    const lp = READER_PAGES[li] ? READER_PAGES[li].html : '<div class="pg pg-blank"></div>';
    const rp = READER_PAGES[ri] ? READER_PAGES[ri].html : '<div class="pg pg-blank"></div>';
    spread.innerHTML = lp + rp;
    const lNum = li + 1; // page numbers start at 2 in the book (index+2 from preview)
    const rNum = ri + 1;
    label.textContent = READER_PAGES[ri]
      ? `Pages ${lNum}–${rNum}`
      : `Page ${lNum}`;
  }

  prev.disabled = READER_IDX === 0;
  next.disabled = READER_IDX >= total - 1;

  // Remove alignment button strips — they're edit-mode only
  spread.querySelectorAll('.pos-btns').forEach(el => el.remove());
  // Remove upload/slot overlays
  spread.querySelectorAll('.photo-slot-inner').forEach(el => {
    if (!el.querySelector('img')) el.closest('.photo-slot')?.remove();
  });
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!document.getElementById('reader-overlay').classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') readerNav(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   readerNav(-1);
  if (e.key === 'Escape') closeReader();
});

// Touch swipe
(function() {
  let tx = 0;
  const el = document.getElementById('reader-overlay');
  el.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  el.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 50) readerNav(dx < 0 ? 1 : -1);
  }, { passive: true });
})();

// ── MAP INJECTION (geocodes missing coords, then injects route + dest maps) ──
function mapboxStyle() {
  return STATE.mapStyle === 'satellite'
    ? 'mapbox/satellite-streets-v12'
    : 'mapbox/outdoors-v12';
}

function toggleMapStyle() {
  STATE.mapStyle = STATE.mapStyle === 'satellite' ? 'terrain' : 'satellite';
  showPreview();
  if (window._mapboxToken) injectMaps();
  saveProgress();

async function injectMaps() {
  if (!window._mapboxToken) return;
  try {
    const PARK_COORDS = {
      'ziwa': [32.87, 1.40], 'murchison': [31.69, 2.27], 'kibale': [30.40, 0.48],
      'queen elizabeth': [30.00, -0.12], 'bwindi': [29.68, -1.05],
      'mburo': [30.95, -0.62], 'entebbe': [32.47, 0.06], 'kidepo': [33.87, 3.82],
      'rwenzori': [29.97, 0.38], 'mgahinga': [29.63, -1.37],
      'serengeti': [34.83, -2.33], 'ngorongoro': [35.50, -3.20], 'masai mara': [35.17, -1.42],
      'amboseli': [37.25, -2.65], 'tsavo': [38.47, -2.98], 'samburu': [37.53, 0.62],
      'kruger': [31.50, -23.99], 'etosha': [16.32, -18.86], 'okavango': [22.83, -19.33],
      'chobe': [24.50, -17.80], 'hwange': [26.50, -18.90], 'victoria falls': [25.84, -17.92],
      'ruaha': [34.47, -7.78], 'selous': [38.00, -9.00], 'tarangire': [36.00, -3.83],
    };
    function lookupPark(name) {
      const l = name.toLowerCase();
      for (const [k, c] of Object.entries(PARK_COORDS)) { if (l.includes(k)) return c; }
      return null;
    }
    // Geocode parks that are missing coordinates against the current TRIP.days
    const country = TRIP.country || TRIP.destination || '';
    const missing = [...new Set(TRIP.days.map(d => d.park).filter(p => p && !TRIP.days.find(d2 => d2.park === p && d2.lon)))];
    if (missing.length) {
      await Promise.all(missing.map(async park => {
        const known = lookupPark(park);
        if (known) {
          const [lon, lat] = known;
          TRIP.days.forEach(day => { if (day.park === park) { day.lon = lon; day.lat = lat; } });
          return;
        }
        try {
          const q = encodeURIComponent(park + (country ? ', ' + country : ''));
          const gr = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${q}.json?types=place,region,locality&limit=1&access_token=${window._mapboxToken}`);
          const gd = await gr.json();
          const ft = gd.features?.[0];
          if (ft) {
            const [lon, lat] = ft.center;
            TRIP.days.forEach(day => { if (day.park === park) { day.lon = lon; day.lat = lat; } });
          }
        } catch(e) {}
      }));
    }
    // Route map
    const el = document.getElementById('route-map-img');
    if (el) {
      const seen = new Set(); const pts = [];
      TRIP.days.forEach(d => { if (d.park && !seen.has(d.park) && d.lon && d.lat) { seen.add(d.park); pts.push(d); } });
      if (pts.length) {
        const pinStr = pts.map((d, i) => `pin-s-${i+1}+000000(${d.lon},${d.lat})`).join(',');
        el.src = `https://api.mapbox.com/styles/v1/${mapboxStyle()}/static/${pinStr}/auto/600x600@2x?padding=50&access_token=${window._mapboxToken}`;
        el.style.display = '';
      }
    }
    // Destination maps
    const seen2 = new Set();
    TRIP.days.forEach(d => {
      if (!d.park || seen2.has(d.park) || !d.lon || !d.lat) return;
      seen2.add(d.park);
      const img = document.getElementById('dest-map-' + d.park.replace(/[^a-z0-9]/gi, '-').toLowerCase());
      if (img) {
        img.src = `https://api.mapbox.com/styles/v1/${mapboxStyle()}/static/pin-s+000000(${d.lon},${d.lat})/${d.lon},${d.lat},${d.zoom||7}/600x600@2x?access_token=${window._mapboxToken}`;
        img.style.display = '';
      }
    });
  } catch(e) {}
}

async function generateNarrative(type, dayIndex) {
  const btnId = type === 'day' ? 'gen-btn-day-' + dayIndex : 'gen-btn-' + type;
  const taId  = type === 'day' ? 'gen-ta-day-' + dayIndex  : 'gen-ta-' + type;
  const btn = document.getElementById(btnId);
  const ta  = document.getElementById(taId);
  if (!btn || !ta) return;

  btn.disabled = true;
  btn.textContent = '✦ Writing…';

  const allParks = [...new Set(TRIP.days.map(d => d.park).filter(Boolean))];
  const payload = {
    type,
    traveler:    TRIP.traveler,
    destination: TRIP.destination,
    year:        TRIP.year,
    allParks,
  };
  if (type === 'day') {
    const d = TRIP.days[dayIndex];
    const notes = STATE.days[dayIndex].reflection || '';
    payload.day = { num: d.num, location: d.location, park: d.park, lodge: d.lodge, date: d.date, notes };
  }

  try {
    const resp = await fetch('/api/narrative', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (data.text) {
      ta.value = data.text;
      if (type === 'day')        STATE.days[dayIndex].reflection = data.text;
      if (type === 'opening')    STATE.opening.introText = data.text;
      if (type === 'closing')    STATE.closing.text = data.text;
      if (type === 'back-cover') STATE.closing.backCoverText = data.text;
      btn.textContent = '✓ Generated';
      setTimeout(() => { btn.textContent = '✦ Regenerate'; btn.disabled = false; }, 1500);
    } else {
      btn.textContent = '⚠ Try again';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = '⚠ Try again';
    btn.disabled = false;
  }
}

async function saveProgress() {
  const btn = document.querySelector('.topbar-save');
  btn.textContent = 'Saving…';
  btn.disabled = true;

  // Always keep localStorage in sync as fallback
  try { localStorage.setItem('jb_progress', JSON.stringify(STATE)); } catch(e) {}

  // Strip any stray surrounding quotes from URL fields before sending
  const sq = v => (v || '').replace(/^["']+|["']+$/g, '') || null;

  const urlTripId = new URLSearchParams(window.location.search).get('tripId') || '';
  const payload = {
    sessionId:       SESSION_ID,
    tripId:          urlTripId,
    coverTitle:      STATE.cover.title,
    coverSubtitle:   STATE.cover.subtitle,
    coverPhotoUrl:   sq(STATE.cover.photoUrl) || '',
    openingText:     JSON.stringify({ text: STATE.opening.introText || '', coverPhotoUrl: sq(STATE.cover.photoUrl), spreadPhotoUrl: sq(STATE.cover.spreadPhotoUrl) || '', teasers: STATE.teasers, positions: STATE.positions, mapStyle: STATE.mapStyle, portrait2Url: sq(STATE.closing.portrait2Url), backCoverUrl: sq(STATE.closing.backCoverUrl), backCoverText: STATE.closing.backCoverText || '' }),
    daysData:        JSON.stringify(STATE.days),
    closingText:      STATE.closing.text              || '',
    closingPhotoUrl:  sq(STATE.closing.photoUrl)      || '',
    portraitPhotoUrl: sq(STATE.closing.portraitUrl)   || '',
    guideData:        JSON.stringify(STATE.company),
    bookStatus:      'Draft'
  };

  try {
    let resp, data;
    if (_bookId) {
      resp = await fetch('/api/journey-book?id=' + encodeURIComponent(_bookId),
        { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      data = await resp.json();
    } else {
      resp = await fetch('/api/journey-book',
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      data = await resp.json();
      if (data.id) { _bookId = data.id; localStorage.setItem('jb_book_id', _bookId); }
      // Handle duplicate session — use existing record
      if (resp.status === 409 && data.id) { _bookId = data.id; localStorage.setItem('jb_book_id', _bookId); }
    }
    if (data.ok || data.id) {
      btn.textContent = '✓ Saved';
    } else {
      console.error('Save failed response:', JSON.stringify(data));
      btn.textContent = '⚠ Save failed';
    }
  } catch(e) {
    console.error('Save exception:', e);
    btn.textContent = '⚠ Save failed';
  }

  btn.disabled = false;
  setTimeout(() => { btn.textContent = 'Save Progress'; }, 2500);
}

// ── LOAD ───────────────────────────────────────────────────────────────────
function cleanUrl(v) {
  if (!v) return null;
  const s = v.trim().replace(/^["']+|["']+$/g, '');
  return s || null;
}

function applyBookFields(f) {
  STATE.cover.title      = f['Cover Title']      || '';
  STATE.cover.subtitle   = f['Cover Subtitle']   || '';
  STATE.cover.photoUrl   = cleanUrl(f['Cover Photo URL']);
  if (f['Opening Text']) {
    try {
      const od = JSON.parse(f['Opening Text']);
      STATE.opening.introText     = od.text           || '';
      if (od.coverPhotoUrl)       STATE.cover.photoUrl       = cleanUrl(od.coverPhotoUrl);
      STATE.cover.spreadPhotoUrl  = cleanUrl(od.spreadPhotoUrl);
      if (od.teasers)      Object.assign(STATE.teasers,    od.teasers);
      if (od.positions)    Object.assign(STATE.positions,  od.positions);
      if (od.mapStyle)     STATE.mapStyle = od.mapStyle;
      if (od.portrait2Url !== undefined) STATE.closing.portrait2Url = cleanUrl(od.portrait2Url);
      if (od.backCoverUrl !== undefined) STATE.closing.backCoverUrl = cleanUrl(od.backCoverUrl);
      if (od.backCoverText !== undefined) STATE.closing.backCoverText = od.backCoverText;
    } catch(e) { STATE.opening.introText = f['Opening Text']; }
  }
  STATE.closing.text        = f['Closing Text']        || '';
  STATE.closing.photoUrl    = cleanUrl(f['Closing Photo URL']);
  STATE.closing.portraitUrl = cleanUrl(f['Portrait Photo URL']);
  if (f['Days Data']) {
    try {
      const days = JSON.parse(f['Days Data']);
      if (Array.isArray(days) && days.length === STATE.days.length) {
        days.forEach((d, i) => Object.assign(STATE.days[i], d));
      }
    } catch(e) {}
  }
  if (f['Guide Data']) {
    try { Object.assign(STATE.company, JSON.parse(f['Guide Data'])); } catch(e) {}
  }
}

async function loadProgress() {
  // 1. Try by sessionId
  try {
    const resp = await fetch('/api/journey-book?sessionId=' + encodeURIComponent(SESSION_ID));
    if (resp.ok) {
      const data = await resp.json();
      if (data.book) {
        _bookId = data.book.id;
        localStorage.setItem('jb_book_id', _bookId);
        applyBookFields(data.book.fields);
        return;
      }
    }
  } catch(e) {}

  // 2. If tripId present, try by tripId (handles port changes / new devices)
  const urlTripId = new URLSearchParams(window.location.search).get('tripId');
  if (urlTripId) {
    try {
      const resp = await fetch('/api/journey-book?tripId=' + encodeURIComponent(urlTripId));
      if (resp.ok) {
        const data = await resp.json();
        if (data.book) {
          _bookId = data.book.id;
          localStorage.setItem('jb_book_id', _bookId);
          applyBookFields(data.book.fields);
          return;
        }
      }
    } catch(e) {}
  }

  // 3. Fallback to localStorage
  try {
    const saved = localStorage.getItem('jb_progress');
    if (!saved) return;
    const s = JSON.parse(saved);
    if (s.cover) {
      if (s.cover.photoUrl)       s.cover.photoUrl       = cleanUrl(s.cover.photoUrl);
      if (s.cover.spreadPhotoUrl) s.cover.spreadPhotoUrl = cleanUrl(s.cover.spreadPhotoUrl);
      Object.assign(STATE.cover, s.cover);
    }
    if (s.opening) Object.assign(STATE.opening, s.opening);
    if (s.closing) {
      ['photoUrl','portraitUrl','portrait2Url','backCoverUrl'].forEach(k => {
        if (s.closing[k]) s.closing[k] = cleanUrl(s.closing[k]);
      });
      Object.assign(STATE.closing, s.closing);
    }
    if (s.company) Object.assign(STATE.company, s.company);
    if (s.days && s.days.length === STATE.days.length) {
      s.days.forEach((d, i) => Object.assign(STATE.days[i], d));
    }
    if (s.teasers)    Object.assign(STATE.teasers,    s.teasers);
    if (s.positions)  Object.assign(STATE.positions,  s.positions);
    if (s.mapStyle)   STATE.mapStyle = s.mapStyle;
  } catch(e) {}
}

// ── INIT ───────────────────────────────────────────────────────────────────
(async () => {
  const urlTripId = new URLSearchParams(window.location.search).get('tripId');
  if (urlTripId) {
    try {
      const r = await fetch('/api/load-trip?tripId=' + encodeURIComponent(urlTripId));
      if (r.ok) {
        const d = await r.json();
        if (d.trip) {
          // Overwrite TRIP with live data, rebuild steps
          Object.assign(TRIP, d.trip);
          // Re-init STATE.days to match loaded day count
          STATE.days = TRIP.days.map(() => ({ heroUrl: null, photo2Url: null, photo3Url: null, reflection: '', narrative: '' }));
          // Rebuild steps with new day list
          STEPS.length = 0;
          buildSteps().forEach(s => STEPS.push(s));
          // SESSION_ID already uses 'trip-' + urlTripId when param is present
        }
      }
    } catch(e) {}
  }
  await loadProgress();
  const params    = new URLSearchParams(window.location.search);
  const readMode  = params.get('view')   === '1';
  const photoMode = params.get('photos') === '1';
  if (photoMode) {
    showPhotoMode();
  } else if (readMode) {
    document.body.classList.add('read-mode');
    showPreview();
    openReader();
  } else {
    goToStep(0);
  }
})();
</script>
