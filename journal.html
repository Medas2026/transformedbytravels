<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Transformed by Travels">
  <link rel="apple-touch-icon" href="/images/app-icon.png">
  <title>Travel Journal · Transformed by Travels</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Georgia&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a1628;
      color: #e2e8f0;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    .logo {
      width: 80px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 1.5rem;
      color: #2dd4bf;
      text-align: center;
      margin-bottom: 6px;
    }

    .date-line {
      font-size: 0.85rem;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 28px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .prompt-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .prompt-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #e2e8f0;
      line-height: 1.5;
    }

    .prompt-label span {
      color: #2dd4bf;
      font-size: 1rem;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #2dd4bf; }

    .mic-input-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .mic-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .mic-btn {
      background: none;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      padding: 8px 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      min-height: 56px;
      transition: border-color 0.2s, color 0.2s;
    }

    .mic-btn.recording {
      border-color: #f43f5e;
      color: #f43f5e;
      animation: pulse 1s infinite;
    }

    .mic-status {
      font-size: 0.65rem;
      color: #64748b;
      text-align: center;
      max-width: 34px;
      word-break: break-word;
      line-height: 1.2;
    }

    .mic-textarea {
      flex: 1;
      min-width: 0;
      width: auto;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .submit-btn {
      background: #2dd4bf;
      color: #0f172a;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }

    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      text-align: center;
      font-size: 0.9rem;
      min-height: 20px;
    }

    .success-msg {
      text-align: center;
      padding: 32px 16px;
    }

    .success-msg .icon { font-size: 3rem; margin-bottom: 16px; }

    .success-msg h2 {
      font-family: Georgia, serif;
      font-size: 1.4rem;
      color: #2dd4bf;
      margin-bottom: 10px;
    }

    .success-msg p {
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.6;
    }
  </style>
  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-_E9cFdzUFrWlkW9MIz16L.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>
  <!-- DOMPurify: sanitize AI-generated HTML before rendering -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
</head>
<body>

  <img src="/images/Base%20Green%20Graphic%20Logo%20Black.png" alt="Transformed by Travels" class="logo" />
  <h1>Travel for Growth Journal</h1>
  <div class="date-line" id="date-line"></div>
  <a href="/portal.html" style="display:inline-block;margin-bottom:20px;padding:8px 20px;background:none;border:1.5px solid #334155;border-radius:8px;color:#94a3b8;font-family:'Montserrat',sans-serif;font-size:0.8rem;font-weight:600;text-decoration:none;">← Return to Portal</a>

  <div class="card" id="journal-card">

    <div id="journal-lead-in" style="margin-bottom:22px;padding:16px 20px;background:rgba(45,212,191,0.07);border-left:3px solid #2dd4bf;border-radius:0 10px 10px 0;display:none;">
      <p id="journal-lead-in-text" style="margin:0;font-size:0.95rem;color:#e2e8f0;line-height:1.75;"></p>
    </div>

    <div class="prompt-block">
      <div class="prompt-label"><span>1.</span> Any reflections on your goals from today's activities?</div>
      <div class="mic-input-row">
        <div class="mic-col">
          <button class="mic-btn" id="mic-1" onclick="toggleMic(1)">🎤</button>
          <span id="mic-1-status" class="mic-status"></span>
        </div>
        <textarea id="reflection" class="mic-textarea" placeholder="What came up for you today? What did you notice, discover, or feel…"></textarea>
      </div>
    </div>

    <div class="prompt-block">
      <div class="prompt-label"><span>2.</span> Any barriers to advancing your efforts?</div>
      <div class="mic-input-row">
        <div class="mic-col">
          <button class="mic-btn" id="mic-2" onclick="toggleMic(2)">🎤</button>
          <span id="mic-2-status" class="mic-status"></span>
        </div>
        <textarea id="barriers" class="mic-textarea" placeholder="What got in the way? What felt hard or unclear…"></textarea>
      </div>
    </div>

    <div class="prompt-block">
      <div class="prompt-label"><span>3.</span> What was the best memory you created today?</div>
      <div class="mic-input-row">
        <div class="mic-col">
          <button class="mic-btn" id="mic-3" onclick="toggleMic(3)">🎤</button>
          <span id="mic-3-status" class="mic-status"></span>
        </div>
        <textarea id="memory" class="mic-textarea" placeholder="What moment will you carry with you from today…"></textarea>
      </div>
    </div>

    <div class="prompt-block">
      <div class="prompt-label">📷 Photo from today <span style="font-size:0.8rem;font-weight:400;color:#94a3b8;">(optional)</span></div>
      <input type="hidden" id="photo-url" />
      <div id="photo-linked" style="display:none;display:none;align-items:center;gap:10px;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:10px;">
        <span style="color:#2dd4bf;font-size:0.88rem;">📷 Photo linked</span>
        <button type="button" onclick="openJournalPhoto()" style="background:none;border:1px solid #334155;border-radius:6px;padding:4px 12px;color:#94a3b8;font-family:'Montserrat',sans-serif;font-size:0.8rem;cursor:pointer;">Open</button>
        <button type="button" onclick="unlinkJournalPhoto()" style="background:none;border:1px solid #334155;border-radius:6px;padding:4px 12px;color:#94a3b8;font-family:'Montserrat',sans-serif;font-size:0.8rem;cursor:pointer;">Unlink</button>
      </div>
      <div id="photo-none">
        <button type="button" onclick="linkJournalPhoto()" style="background:none;border:1.5px solid rgba(45,212,191,0.4);border-radius:8px;padding:9px 20px;color:#2dd4bf;font-family:'Montserrat',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;">📷 Link Dropbox Photo</button>
      </div>
    </div>

    <div id="status" style="color:#94a3b8;"></div>

    <button class="submit-btn" id="submit-btn" onclick="submitJournal()">Save Journal Entry</button>

  </div>

<script>
  // — Parse URL params
  const params     = new URLSearchParams(location.search);
  const email      = params.get('email')   || '';
  const tripId     = params.get('trip')    || '';
  const dateStr    = params.get('date')    || new Date().toISOString().split('T')[0];
  const startDate  = params.get('start')   || '';
  const tripName   = params.get('dest')    || '';
  const dayType    = (params.get('daytype') || 'MIDDLE').toUpperCase();

  // — Fetch and display lead-in prompt
  fetch('/api/journal-prompts')
    .then(r => r.json())
    .then(prompts => {
      const text = prompts[dayType] || '';
      if (text) {
        document.getElementById('journal-lead-in-text').textContent = text;
        document.getElementById('journal-lead-in').style.display = 'block';
      }
    })
    .catch(() => {});

  // — Fetch traveler profile for archetype + hopes
  let travelerArchetype = '';
  let travelerHopes     = '';
  if (email) {
    fetch('/api/airtable-traveler?email=' + encodeURIComponent(email))
      .then(r => r.json())
      .then(d => {
        if (d.record && d.record.fields) {
          travelerArchetype = d.record.fields['Archetype']           || '';
          travelerHopes     = d.record.fields['Hopes to Experience'] || '';
        }
      })
      .catch(() => {});
  }

  // — Pre-fill form if an entry already exists for this date
  let existingRecordId = null;
  if (email && tripId) {
    fetch(`/api/journal?action=entries&email=${encodeURIComponent(email)}&tripId=${encodeURIComponent(tripId)}`)
      .then(r => r.json())
      .then(d => {
        const existing = (d.records || []).find(r => r.fields['Entry Date'] === dateStr);
        if (existing) {
          existingRecordId = existing.id;
          document.getElementById('reflection').value = existing.fields['Reflection']    || '';
          document.getElementById('barriers').value   = existing.fields['Barriers']      || '';
          document.getElementById('memory').value     = existing.fields['Best Memory']   || '';
          const photoUrl = existing.fields['Photo URL'] || '';
          document.getElementById('photo-url').value = photoUrl;
          if (photoUrl) {
            document.getElementById('photo-linked').style.display = 'flex';
            document.getElementById('photo-none').style.display   = 'none';
          }
          document.getElementById('submit-btn').textContent = 'Update Journal Entry';
          document.getElementById('status').textContent = 'Previous entry loaded — edit and save to update.';
        }
      })
      .catch(() => {});
  }

  // — Date display
  const d = new Date(dateStr + 'T12:00:00');
  document.getElementById('date-line').textContent =
    d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  // — Dropbox photo linking
  function linkJournalPhoto() {
    Dropbox.choose({
      success: function(files) {
        document.getElementById('photo-url').value = files[0].link;
        document.getElementById('photo-linked').style.display = 'flex';
        document.getElementById('photo-none').style.display   = 'none';
      },
      cancel: function() {},
      linkType:      'preview',
      multiselect:   false,
      folderselect:  false
    });
  }
  function openJournalPhoto() {
    const url = document.getElementById('photo-url').value;
    if (url) window.open(url, '_blank');
  }
  function unlinkJournalPhoto() {
    document.getElementById('photo-url').value = '';
    document.getElementById('photo-linked').style.display = 'none';
    document.getElementById('photo-none').style.display   = 'block';
  }

  // — Voice input
  const recognizers = {};

  function toggleMic(num) {
    const btnEl    = document.getElementById(`mic-${num}`);
    const statusEl = document.getElementById(`mic-${num}-status`);
    const textareaId = num === 1 ? 'reflection' : num === 2 ? 'barriers' : 'memory';

    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      statusEl.textContent = 'Voice not supported in this browser.';
      return;
    }

    if (recognizers[num] && recognizers[num]._running) {
      recognizers[num].stop();
      return;
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.continuous    = true;
    rec.interimResults = true;
    rec.lang          = 'en-US';
    recognizers[num]  = rec;
    rec._running      = true;

    const existing = document.getElementById(textareaId).value;

    rec.onresult = (e) => {
      let interim = '';
      let final   = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final   += e.results[i][0].transcript + ' ';
        else                        interim += e.results[i][0].transcript;
      }
      document.getElementById(textareaId).value = existing + final + interim;
    };

    rec.onend = () => {
      rec._running = false;
      btnEl.classList.remove('recording');
      btnEl.textContent = '🎤 Speak';
      statusEl.textContent = '';
    };

    rec.onerror = () => {
      rec._running = false;
      btnEl.classList.remove('recording');
      btnEl.textContent = '🎤 Speak';
      statusEl.textContent = 'Mic error.';
    };

    rec.start();
    btnEl.classList.add('recording');
    btnEl.textContent = '⏹ Stop';
    statusEl.textContent = 'Listening…';
  }

  // — Submit
  async function submitJournal() {
    const reflection = document.getElementById('reflection').value.trim();
    const barriers   = document.getElementById('barriers').value.trim();
    const memory     = document.getElementById('memory').value.trim();
    const photoUrl   = document.getElementById('photo-url').value.trim();
    const statusEl   = document.getElementById('status');
    const btn        = document.getElementById('submit-btn');

    if (!reflection && !barriers) {
      statusEl.style.color = '#f43f5e';
      statusEl.textContent = 'Please enter at least one reflection before saving.';
      return;
    }

    btn.disabled = true;
    statusEl.style.color = '#94a3b8';
    statusEl.textContent = 'Saving…';

    try {
      statusEl.textContent = 'Saving… getting your reflection from Claude…';

      const resp = await fetch('/api/journal', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, tripId, startDate, entryDate: dateStr, tripName, reflection, barriers, memory, photoUrl, archetype: travelerArchetype, hopes: travelerHopes, recordId: existingRecordId })
      });
      const data = await resp.json();

      if (data.success) {
        try { plausible('Journal Entry Saved'); } catch(e) {}
        const _reflectionRaw = data.claudeReflection
          ? `<div style="margin-top:20px;padding:16px;background:#0f172a;border-radius:10px;border-left:3px solid #2dd4bf;text-align:left;">
               <div style="font-size:0.75rem;color:#2dd4bf;font-weight:700;margin-bottom:8px;letter-spacing:0.05em;">YOUR COACH REFLECTS</div>
               ${data.claudeReflection.match(/[^.!?]+[.!?]+/g)?.map(s => `<p style="color:#e2e8f0;font-size:0.9rem;line-height:1.7;margin-bottom:10px;">${s.trim()}</p>`).join('') || `<p style="color:#e2e8f0;font-size:0.9rem;line-height:1.7;">${data.claudeReflection}</p>`}
             </div>`
          : '';
        const claudeBlock = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(_reflectionRaw) : _reflectionRaw;
        document.getElementById('journal-card').innerHTML = `
          <div class="success-msg">
            <div class="icon">🌟</div>
            <h2>Journal saved!</h2>
            <p>Your reflections have been captured. Keep exploring, keep growing — see you tomorrow evening.</p>
            ${claudeBlock}
            <a href="/portal.html" style="display:inline-block;margin-top:24px;padding:12px 32px;background:#2dd4bf;border-radius:10px;color:#0f172a;font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.92rem;text-decoration:none;">← Back to Portal</a>
          </div>`;
      } else {
        statusEl.style.color = '#f43f5e';
        statusEl.textContent = 'Error: ' + (data.error || 'Could not save entry.');
        btn.disabled = false;
      }
    } catch(err) {
      statusEl.style.color = '#f43f5e';
      statusEl.textContent = 'Network error: ' + err.message;
      btn.disabled = false;
    }
  }
</script>

<script src="https://www.dropbox.com/static/api/2/dropins.js" id="dropboxjs" data-app-key="zhj727jtnrlt2i0"></script>
</body>
</html>
